  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

#E9ECE8; overflow:hidden;\">\n  <div class=\"sheet\" ref=\"{{ sheetRef }}\" style=\"flex:0 0 auto; width:794px; height:1123px; transform:scale(var(--s,1)); transform-origin:top center; background:#F2F3F1; color:#24332F; box-shadow:0 1px 0 rgba(64,96,96,.12), 0 30px 70px -30px rgba(36,51,47,.4); padding:28px 42px; font-family:Arimo,'Helvetica Neue',Helvetica,Arial,sans-serif; -webkit-font-smoothing:antialiased;\">\n\n    <!-- MASTHEAD -->\n    <header style=\"display:flex; align-items:flex-start; justify-content:space-between; gap:24px;\">\n      <img src=\"82c98b89-a53d-4819-9ee2-0d6322b2ab39\" alt=\"Fosense — Clinical Clarity From Complexity\" style=\"height:46px; width:auto; display:block;\">\n      <div style=\"text-align:right; max-width:300px;\">\n        <div style=\"font-size:10px; font-weight:700; letter-spacing:.11em; color:#406060; line-height:1.5;\">MEET FOSENSE AT MIXiii&nbsp;HEALTH-TECH.IL&nbsp;2026<\u002Fdiv>\n        <div style=\"font-size:10.5px; color:#5C6E6A; line-height:1.5; margin-top:2px;\">June&nbsp;29–30,&nbsp;2026&nbsp;·&nbsp;ICC&nbsp;Jerusalem&nbsp;·&nbsp;Startup exhibition booth<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fheader>\n    <div style=\"height:1px; background:rgba(64,96,96,.18); margin:14px 0 0;\"><\u002Fdiv>\n\n    <!-- HERO -->\n    <section style=\"padding-top:14px;\">\n      <div style=\"font-size:10px; font-weight:700; letter-spacing:.2em; color:#5C6E6A;\">FOSENSE&nbsp;&nbsp;|&nbsp;&nbsp;ONE-PAGE COMPANY PROFILE<\u002Fdiv>\n      <h1 style=\"font-weight:700; color:#406060; font-size:26px; line-height:1.08; letter-spacing:-.012em; margin:7px 0 0; max-width:24ch; text-wrap:balance;\">Fosense builds clinician-controlled information management technology for child mental health and neurodevelopmental services.<\u002Fh1>\n      <p style=\"font-size:13px; line-height:1.42; color:#24332F; margin:8px 0 0; max-width:74ch; text-wrap:pretty;\">Clinician-controlled, source-traceable information organization, without autonomous clinical interpretation or decision-making.<\u002Fp>\n    <\u002Fsection>\n\n    <!-- MAIN: two columns -->\n    <div style=\"display:grid; grid-template-columns:1.22fr 1fr; gap:34px; margin-top:8px;\">\n\n      <!-- LEFT: narrative spine -->\n      <div>\n        <p style=\"font-size:10.5px; line-height:1.5; color:#24332F; margin:0 0 12px; text-wrap:pretty;\">Fosense develops <strong style=\"color:#406060; font-weight:700;\">Fosight<\u002Fstrong>, a proprietary multi-source information management platform for clinicians working in child and adolescent mental health and neurodevelopmental services. Fosight helps clinicians organize fragmented information from multiple sources, including parents and caregivers, teachers, questionnaires, prior reports, clinical observations, and supervised game-based interactions. This helps clinicians organize and review behavioral information in a structured manner, while preserving the complexity of the case.<\u002Fp>\n\n        <section ref=\"{{ spineRef }}\" style=\"position:relative; padding-left:40px;\">\n          <div style=\"position:absolute; left:17px; top:6px; bottom:6px; width:2px; background:rgba(64,96,96,.30);\"><\u002Fdiv>\n\n          <!-- station 01 -->\n          <div style=\"position:relative; padding-bottom:13px;\">\n            <div class=\"reveal-tick t1\" style=\"position:absolute; left:-29px; top:5px; width:11px; height:11px; background:#F4C14A;\"><\u002Fdiv>\n            <div style=\"display:flex; align-items:baseline; gap:11px;\">\n              <span style=\"font-size:14px; font-weight:700; color:#406060; letter-spacing:.03em;\">01<\u002Fspan>\n              <h2 style=\"margin:0; font-size:10px; font-weight:700; letter-spacing:.16em; color:#406060;\">MULTIPLE SOURCES<\u002Fh2>\n            <\u002Fdiv>\n            <div style=\"display:grid; grid-template-columns:1fr 1fr; column-gap:22px; margin-top:10px;\">\n              <div style=\"font-size:10px; line-height:1.3; color:#24332F; border-top:1px solid rgba(64,96,96,.16); padding:6px 0;\">Parents and caregivers<\u002Fdiv>\n              <div style=\"font-size:10px; line-height:1.3; color:#24332F; border-top:1px solid rgba(64,96,96,.16); padding:6px 0;\">Teachers<\u002Fdiv>\n              <div style=\"font-size:10px; line-height:1.3; color:#24332F; border-top:1px solid rgba(64,96,96,.16); padding:6px 0;\">Clinical observations<\u002Fdiv>\n              <div style=\"font-size:10px; line-height:1.3; color:#24332F; border-top:1px solid rgba(64,96,96,.16); padding:6px 0;\">Prior reports<\u002Fdiv>\n              <div style=\"font-size:10px; line-height:1.3; color:#24332F; border-top:1px solid rgba(64,96,96,.16); padding:6px 0;\">Questionnaires and scales<\u002Fdiv>\n              <div style=\"font-size:10px; line-height:1.3; color:#24332F; border-top:1px solid rgba(64,96,96,.16); padding:6px 0;\">Standardized tests<\u002Fdiv>\n              <div style=\"font-size:10px; line-height:1.3; color:#24332F; border-top:1px solid rgba(64,96,96,.16); padding:6px 0;\">Supervised game-based interactions<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- station 02 -->\n          <div style=\"position:relative; padding-bottom:13px;\">\n            <div class=\"reveal-tick t2\" style=\"position:absolute; left:-29px; top:5px; width:11px; height:11px; background:#F4C14A;\"><\u002Fdiv>\n            <div style=\"display:flex; align-items:baseline; gap:11px;\">\n              <span style=\"font-size:14px; font-weight:700; color:#406060; letter-spacing:.03em;\">02<\u002Fspan>\n              <h2 style=\"margin:0; font-size:10px; font-weight:700; letter-spacing:.16em; color:#406060;\">STRUCTURED, TRACEABLE WORKSPACE<\u002Fh2>\n            <\u002Fdiv>\n            <p style=\"font-size:10.5px; line-height:1.45; color:#24332F; margin:9px 0 0; text-wrap:pretty;\">The platform brings this information into a structured, traceable workspace where clinicians can see where each data point came from, which sources support it, and where gaps or discrepancies exist between informants.<\u002Fp>\n          <\u002Fdiv>\n\n          <!-- station 03 -->\n          <div style=\"position:relative;\">\n            <div class=\"reveal-tick t3\" style=\"position:absolute; left:-29px; top:5px; width:11px; height:11px; background:#F4C14A;\"><\u002Fdiv>\n            <div style=\"display:flex; align-items:baseline; gap:11px;\">\n              <span style=\"font-size:14px; font-weight:700; color:#406060; letter-spacing:.03em;\">03<\u002Fspan>\n              <h2 style=\"margin:0; font-size:10px; font-weight:700; letter-spacing:.16em; color:#406060;\">CLINICIAN REVIEW<\u002Fh2>\n            <\u002Fdiv>\n            <p style=\"font-size:10.5px; line-height:1.45; color:#24332F; margin:9px 0 0; text-wrap:pretty;\">Fosight highlights information provided by different sources but does not determine the clinical significance of that information. All clinical interpretation, diagnosis, and treatment decisions remain with the clinician.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsection>\n      <\u002Fdiv>\n\n      <!-- RIGHT: why + differentiators -->\n      <div style=\"display:flex; flex-direction:column; gap:15px;\">\n        <section>\n          <div style=\"font-size:9.5px; font-weight:700; letter-spacing:.15em; color:#5C6E6A; margin-bottom:9px;\">WHY IT MATTERS<\u002Fdiv>\n          <p style=\"font-size:10.5px; line-height:1.45; color:#24332F; margin:0; text-wrap:pretty;\">Child and adolescent mental health and neurodevelopmental assessments often depend on fragmented information. Parents may see one pattern, teachers another, questionnaires may capture only part of the picture, and prior reports or clinical observations add further layers.<\u002Fp>\n          <p style=\"font-size:10.5px; line-height:1.45; color:#24332F; margin:10px 0 0; text-wrap:pretty;\">Instead of reducing the information into a single overall summary, Fosight preserves source traceability and surfaces gaps and discrepancies for clinician review.<\u002Fp>\n        <\u002Fsection>\n        <section>\n          <div style=\"font-size:9.5px; font-weight:700; letter-spacing:.15em; color:#5C6E6A; margin-bottom:4px;\">WHAT MAKES FOSIGHT DIFFERENT<\u002Fdiv>\n          <div style=\"display:flex; gap:11px; padding:7px 0; border-top:1px solid rgba(64,96,96,.16);\">\n            <span style=\"font-size:15px; font-weight:700; color:#406060; line-height:1; flex:0 0 auto;\">01<\u002Fspan>\n            <p style=\"margin:0; font-size:10.5px; line-height:1.38; color:#24332F; text-wrap:pretty;\">Multi-source information organized in one workspace.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:11px; padding:7px 0; border-top:1px solid rgba(64,96,96,.16);\">\n            <span style=\"font-size:15px; font-weight:700; color:#406060; line-height:1; flex:0 0 auto;\">02<\u002Fspan>\n            <p style=\"margin:0; font-size:10.5px; line-height:1.38; color:#24332F; text-wrap:pretty;\">Traceability back to the original source.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:11px; padding:7px 0; border-top:1px solid rgba(64,96,96,.16);\">\n            <span style=\"font-size:15px; font-weight:700; color:#406060; line-height:1; flex:0 0 auto;\">03<\u002Fspan>\n            <p style=\"margin:0; font-size:10.5px; line-height:1.38; color:#24332F; text-wrap:pretty;\">Differences and information gaps highlighted for clinician review without generating clinical conclusions.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:11px; padding:7px 0; border-top:1px solid rgba(64,96,96,.16);\">\n            <span style=\"font-size:15px; font-weight:700; color:#406060; line-height:1; flex:0 0 auto;\">04<\u002Fspan>\n            <p style=\"margin:0; font-size:10.5px; line-height:1.38; color:#24332F; text-wrap:pretty;\">Full clinician control over interpretation and decision-making.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsection>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- SYSTEM BOUNDARIES -->\n    <section style=\"margin-top:10px; padding-top:9px; border-top:1px solid rgba(64,96,96,.16); display:flex; gap:34px;\">\n      <div style=\"flex:0 0 150px; font-size:9.5px; font-weight:700; letter-spacing:.15em; color:#5C6E6A; padding-top:3px;\">SYSTEM BOUNDARIES<\u002Fdiv>\n      <div style=\"flex:1 1 auto; display:grid; grid-template-columns:1fr 1fr; gap:0 28px;\">\n        <div style=\"display:flex; gap:10px; align-items:flex-start; padding:6px 0; border-top:1px solid rgba(64,96,96,.14);\">\n          <span style=\"flex:0 0 auto; width:6px; height:6px; background:#406060; margin-top:5px;\"><\u002Fspan>\n          <p style=\"margin:0; font-size:10px; line-height:1.4; color:#24332F; text-wrap:pretty;\">Fosight does not diagnose, generate diagnostic classifications, risk scores, clinical recommendations, or treatment recommendations.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:10px; align-items:flex-start; padding:6px 0; border-top:1px solid rgba(64,96,96,.14);\">\n          <span style=\"flex:0 0 auto; width:6px; height:6px; background:#406060; margin-top:5px;\"><\u002Fspan>\n          <p style=\"margin:0; font-size:10px; line-height:1.4; color:#24332F; text-wrap:pretty;\">It does not replace clinical judgment.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:10px; align-items:flex-start; padding:6px 0; border-top:1px solid rgba(64,96,96,.14);\">\n          <span style=\"flex:0 0 auto; width:6px; height:6px; background:#406060; margin-top:5px;\"><\u002Fspan>\n          <p style=\"margin:0; font-size:10px; line-height:1.4; color:#24332F; text-wrap:pretty;\">It does not generate autonomous treatment decisions.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:10px; align-items:flex-start; padding:6px 0; border-top:1px solid rgba(64,96,96,.14);\">\n          <span style=\"flex:0 0 auto; width:6px; height:6px; background:#406060; margin-top:5px;\"><\u002Fspan>\n          <p style=\"margin:0; font-size:10px; line-height:1.4; color:#24332F; text-wrap:pretty;\">Fosight highlights information provided by different sources but does not determine the clinical significance of that information.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:10px; align-items:flex-start; padding:6px 0; border-top:1px solid rgba(64,96,96,.14);\">\n          <span style=\"flex:0 0 auto; width:6px; height:6px; background:#406060; margin-top:5px;\"><\u002Fspan>\n          <p style=\"margin:0; font-size:10px; line-height:1.4; color:#24332F; text-wrap:pretty;\">All clinical interpretation, diagnosis, and treatment decisions remain with the clinician.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- FOOTER: status + contact -->\n    <section style=\"margin-top:10px; padding-top:8px; border-top:2px solid #406060; display:grid; grid-template-columns:1.15fr 1fr; gap:34px; align-items:start;\">\n      <div>\n        <div style=\"font-size:9.5px; font-weight:700; letter-spacing:.15em; color:#5C6E6A; margin-bottom:7px;\">STATUS<\u002Fdiv>\n        <p style=\"font-size:10px; line-height:1.42; color:#24332F; margin:0; text-wrap:pretty;\">Fosense is currently advancing product development, controlled demos, pilot collaboration planning, and validation pathways. The company is seeking connections with clinicians, clinics, hospitals, HMOs, neurodevelopmental assessment centers, researchers, healthcare innovation units, strategic healthcare and technology partners, and early-stage investors.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:14px; justify-content:space-between; align-items:flex-start;\">\n        <div>\n          <div style=\"font-size:9.5px; font-weight:700; letter-spacing:.15em; color:#5C6E6A; margin-bottom:7px;\">CONTACT<\u002Fdiv>\n          <div style=\"font-size:14px; font-weight:700; color:#406060; line-height:1.2;\">Dr. Olga Kovalchuk, MD, PhD<\u002Fdiv>\n          <div style=\"font-size:10.5px; color:#24332F; line-height:1.4; margin-top:1px;\">Chief Executive Officer<\u002Fdiv>\n          <div style=\"font-size:10.5px; line-height:1.7; margin-top:6px;\">\n            <div><span style=\"color:#5C6E6A;\">EMAIL&nbsp;<\u002Fspan><a href=\"mailto:olgakovalchuk@fosense.io\" style=\"color:#406060; text-decoration:none; font-weight:500;\">olgakovalchuk@fosense.io<\u002Fa><\u002Fdiv>\n            <div><span style=\"color:#5C6E6A;\">WEB&nbsp;&nbsp;&nbsp;&nbsp;<\u002Fspan><a href=\"https://fosense.io\" target=\"_blank\" rel=\"noopener\" style=\"color:#406060; text-decoration:none; font-weight:500;\">fosense.io<\u002Fa><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <img src=\"c60d9b2f-f8f5-4d42-8fc8-f9fac5545fe9\" alt=\"Fosense\" style=\"height:46px; width:auto; opacity:.92; display:block; flex:0 0 auto;\">\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fdiv>\n\n  <!-- Floating actions (screen only — never printed) -->\n  <div class=\"screen-only\" ref=\"{{ ctaRef }}\" style=\"display:{{ ctaDisplay }}; position:fixed; bottom:18px; left:50%; transform:translateX(-50%); flex-wrap:wrap; justify-content:center; gap:10px; z-index:50; background:rgba(242,243,241,.92); backdrop-filter:blur(6px); border:1px solid rgba(64,96,96,.16); padding:10px 12px; box-shadow:0 8px 30px -10px rgba(36,51,47,.4);\">\n    <a href=\"data:text/vcard;charset=utf-8,BEGIN%3AVCARD%0D%0AVERSION%3A3.0%0D%0AN%3AKovalchuk%3BOlga%3B%3BDr.%3BMD%2C%20PhD%0D%0AFN%3ADr.%20Olga%20Kovalchuk%2C%20MD%2C%20PhD%0D%0ATITLE%3AChief%20Executive%20Officer%0D%0AORG%3AFosense%0D%0AEMAIL%3BTYPE%3DWORK%3Aolgakovalchuk%40fosense.io%0D%0AURL%3Ahttps%3A%2F%2Ffosense.io%0D%0AEND%3AVCARD%0D%0A\" download=\"Dr-Olga-Kovalchuk.vcf\" style=\"display:inline-flex; align-items:center; gap:8px; background:#406060; color:#F2F3F1; text-decoration:none; font-size:13px; font-weight:700; font-family:Arimo,'Helvetica Neue',Helvetica,Arial,sans-serif; padding:11px 18px; min-height:44px; box-sizing:border-box;\">\n      <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"square\"><path d=\"M12 3v12m0 0l-4-4m4 4l4-4\"><\u002Fpath><path d=\"M4 19h16\"><\u002Fpath><\u002Fsvg>\n      Save contact\n    <\u002Fa>\n    <a href=\"mailto:olgakovalchuk@fosense.io\" style=\"display:inline-flex; align-items:center; font-size:13px; font-weight:700; font-family:Arimo,'Helvetica Neue',Helvetica,Arial,sans-serif; color:#406060; text-decoration:none; padding:11px 18px; min-height:44px; box-sizing:border-box; border:1.5px solid rgba(64,96,96,.4);\">Email<\u002Fa>\n    <button onclick=\"{{ printPage }}\" type=\"button\" style=\"display:inline-flex; align-items:center; cursor:pointer; font-size:13px; font-weight:700; font-family:Arimo,'Helvetica Neue',Helvetica,Arial,sans-serif; color:#406060; background:transparent; padding:11px 18px; min-height:44px; box-sizing:border-box; border:1.5px solid rgba(64,96,96,.4);\">Download A4 PDF<\u002Fbutton>\n    <a href=\"https://fosense.io\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex; align-items:center; font-size:13px; font-weight:700; font-family:Arimo,'Helvetica Neue',Helvetica,Arial,sans-serif; color:#406060; text-decoration:none; padding:11px 18px; min-height:44px; box-sizing:border-box;\">fosense.io&nbsp;→<\u002Fa>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1000,&quot;height&quot;:1000},&quot;enableReveal&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;showCtas&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  sheetRef = React.createRef();\n  spineRef = React.createRef();\n  ctaRef = React.createRef();\n  fit = () => {\n    const el = this.sheetRef.current;\n    if (!el) return;\n    const sideM = 28, topM = 26;\n    const cta = this.ctaRef.current;\n    const barH = cta ? cta.getBoundingClientRect().height : 0; // tracks the bar's real (possibly wrapped) height\n    const botM = barH > 0 ? barH + 32 : 30; // bar height + bottom offset + gap\n    const s = Math.min((window.innerWidth - sideM * 2) / 794, (window.innerHeight - topM - botM) / 1123, 1.5);\n    el.style.setProperty('--s', s > 0 ? s : 1);\n  };\n  componentDidMount() {\n    this.fit();\n    // Re-run after layout settles so the bar's wrapped height is measured correctly.\n    requestAnimationFrame(() => this.fit());\n    window.addEventListener('resize', this.fit);\n    if (this.props.enableReveal !== false &&\n        !(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches)) {\n      const root = this.spineRef.current;\n      const ticks = root ? root.querySelectorAll('.reveal-tick') : [];\n      if (ticks.length) {\n        ticks.forEach(t => t.classList.add('fos-prep'));\n        void root.offsetHeight;\n        ticks.forEach(t => { t.classList.remove('fos-prep'); t.classList.add('fos-go'); });\n      }\n    }\n  }\n  componentWillUnmount() { window.removeEventListener('resize', this.fit); }\n  renderVals() {\n    return {\n      printPage: () => window.print(),\n      sheetRef: this.sheetRef,\n      spineRef: this.spineRef,\n      ctaRef: this.ctaRef,\n      ctaDisplay: this.props.showCtas === false ? 'none' : 'flex'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
